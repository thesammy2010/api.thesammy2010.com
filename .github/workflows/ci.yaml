name: CI
'on':
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    verify:
        name: Compile
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Set up Go
              uses: actions/setup-go@v2
              with:
                  go-version: 1.21.5
            - name: Verify dependencies
              run: go mod verify
            - name: Build
              run: go build -v ./...
            - name: Run go vet
              run: go vet ./...
    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs:
            - verify
        steps:
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Set up Go
              uses: actions/setup-go@v2
              with:
                  go-version: 1.21.5
            - name: Install golint
              run: go install golang.org/x/lint/golint@latest
            - name: Run golint
              run: golint ./...
            - name: Install staticcheck
              run: go install honnef.co/go/tools/cmd/staticcheck@latest
            - name: Run staticcheck
              run: staticcheck ./...
    test:
        name: Test
        runs-on: ubuntu-latest
        needs:
            - verify
        steps:
            - name: Checkout Code
              uses: actions/checkout@v2
            - name: Set up Go
              uses: actions/setup-go@v2
              with:
                  go-version: 1.21.5
            - name: Run tests
              run: go test -race -vet=off ./...
