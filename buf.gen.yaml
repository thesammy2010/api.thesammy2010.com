version: v1
managed:
  enabled: true
#  go_package_prefix:
#    default: github.com/thesammy2010/api.thesammy2010.com/proto
plugins:
  - plugin: go
    out: .
    opt: paths=source_relative
  - plugin: go-grpc
    out: .
    opt: paths=source_relative,require_unimplemented_servers=false
  - plugin: grpc-gateway
    out: .
    opt: paths=source_relative
